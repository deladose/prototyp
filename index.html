<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Outfit Prototyp Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>prototyp.</h1>
        <div class="header-right">
            <button id="runwayBtn" class="minimal-btn">runway.</button>
            <div class="collection-info">Kollektion / 01</div>
        </div>
    </header>

    <div class="layout">
        <main class="canvas-container">
            <div class="outfit-slot" id="slot-oberteil"><span class="empty-text">Oberteil</span></div>
            <div class="outfit-slot" id="slot-tasche"><span class="empty-text">Tasche</span></div>
            <div class="outfit-slot" id="slot-hose"><span class="empty-text">Hose</span></div>
            <div class="outfit-slot" id="slot-schuhe"><span class="empty-text">Schuhe</span></div>
        </main>

        <aside class="sidebar">
            <div class="mobile-handle"></div> <section class="category-section" id="cat-oberteil">
                <h2>Oberteile</h2>
                <div class="thumbnail-grid" id="grid-oberteil"></div>
            </section>

            <section class="category-section" id="cat-tasche">
                <h2>Taschen</h2>
                <div class="thumbnail-grid" id="grid-tasche"></div>
            </section>

            <section class="category-section" id="cat-hose">
                <h2>Hosen</h2>
                <div class="thumbnail-grid" id="grid-hose"></div>
            </section>

            <section class="category-section" id="cat-schuhe">
                <h2>Schuhe</h2>
                <div class="thumbnail-grid" id="grid-schuhe"></div>
            </section>
        </aside>
    </div>

    <div id="webcam-overlay" class="webcam-overlay">
        <div class="webcam-container">
            <video id="webcam-video" autoplay playsinline></video>
            <canvas id="webcam-canvas" style="display:none;"></canvas>
            <button id="captureBtn" class="minimal-btn">gesicht aufnehmen</button>
        </div>
    </div>

    <div id="character" class="character-walker">
        <div id="char-head" class="char-part-head"></div>
        <div id="char-oberteil" class="char-part"></div>
        <div id="char-hose" class="char-part"></div>
        <div id="char-schuhe" class="char-part"></div>
    </div>

    <div id="fullscreen-overlay" class="fullscreen-overlay">
        <img id="fullscreen-img" src="" alt="Detailansicht">
    </div>

    <script src="script.js" defer></script>
</body>
</html>
